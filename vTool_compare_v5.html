<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>房屋投資報酬率對照計算機</title>
    <script src="https://cdn.sheetjs.com/xlsx-latest/package/dist/xlsx.full.min.js"></script>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background-color: #f4f6f9; padding: 20px; font-size: 14px; }
        .container { max-width: 1400px; margin: auto; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        h2 { text-align: center; color: #1a365d; margin-bottom: 25px; }
        .compare-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 25px; }
        .house-column { background: #f8fafc; padding: 20px; border-radius: 8px; border: 1px solid #e2e8f0; }
        .house-title { font-size: 18px; font-weight: bold; color: #2b6cb0; margin-bottom: 15px; border-bottom: 2px solid #cbd5e0; padding-bottom: 8px; }
        .input-grid { display: flex; flex-direction: column; gap: 12px; }
        .input-row { display: flex; gap: 15px; }
        .input-group { flex: 1; }
        label { font-size: 13px; font-weight: 600; color: #4a5568; margin-bottom: 4px; display: block; }
        input { width: 100%; padding: 8px; border: 1px solid #cbd5e0; border-radius: 4px; box-sizing: border-box; font-size: 14px; }
        .matrix-container { overflow-x: auto; margin-top: 20px; }
        /* 表格設定：文字對齊與換行控制 */
        .matrix-table { width: 100%; border-collapse: collapse; font-size: 14px; text-align: center; white-space: nowrap; }
        .matrix-table th { background: #edf2f7; padding: 12px 8px; color: #4a5568; line-height: 1.2; vertical-align: middle; }
        .matrix-table td { padding: 12px 8px; border-bottom: 1px solid #e2e8f0; }
        .loan-group-header { background: #2b6cb0 !important; color: white !important; font-size: 13px; text-align: left; padding: 8px !important; white-space: nowrap; }
        .loan-group-header.b { background: #319795 !important; }
        .btn-export { width: 100%; background: #2f855a; color: white; border: none; padding: 15px; font-size: 16px; font-weight: bold; cursor: pointer; border-radius: 6px; margin-top: 25px; }
        .definition-box { background: #fafafa; padding: 20px; margin-top: 30px; border: 1px solid #e2e8f0; border-radius: 8px; font-size: 14px; color: #4a5568; }
        .def-item { margin-bottom: 8px; line-height: 1.6; }
    </style>
</head>
<body>
<div class="container">
    <h2>房屋投資報酬率對照計算機</h2>
    <div class="compare-grid" id="mainGrid"></div>
    <button class="btn-export" onclick="exportExcel()">匯出 Excel 檔案</button>
    
    <div class="definition-box">
        <div style="font-weight: bold; color: #1a365d; margin-bottom: 10px;">💡 財務指標與設定說明</div>
        <div class="def-item">• <span style="color:#b7791f; font-weight:600;">利息(萬)</span>：持有期內累計支付給銀行的總利息成本。</div>
        <div class="def-item">• <span style="color:#9b2c2c; font-weight:600;">付出(萬)</span>：期初投入現金（自備+雜支）與持有期內支付房貸本利和之總額。</div>
        <div class="def-item">• <span style="background:#ebf8ff; font-weight:700;">淨利(萬)</span>：總賣價 - 總買價 + 租金收益 - 雜支(總價2%) - 仲介費(售價4%) - 利息 - 稅。</div>
        <div class="def-item">• 稅率規則：2年內 45% | 2-5年 35% | 5-10年 20% | 10年以上 15%</div>
    </div>
</div>

<script>
    function getTaxRate(y) { return y < 2 ? 0.45 : y < 5 ? 0.35 : y < 10 ? 0.20 : 0.15; }
    function calcPayment(amt, ir, graceY) {
        const mRate = ir / 12, totalM = 360, graceM = graceY * 12;
        const gracePay = amt * mRate;
        const postPay = amt * (mRate * Math.pow(1 + mRate, totalM - graceM)) / (Math.pow(1 + mRate, totalM - graceM) - 1);
        return { grace: gracePay, post: postPay };
    }
    function render() {
        document.getElementById('mainGrid').innerHTML = '';
        ['A', 'B'].forEach(s => {
            const html = `
                <div class="house-column">
                    <div class="house-title ${s==='B'?'b':''}">物件 ${s}</div>
                    <div class="input-grid">
                        <div class="input-row"><div class="input-group"><label>總價(萬)</label><input type="number" id="tp_${s}" value="${s==='A'?2450:1988}" oninput="calc()"></div><div class="input-group"><label>坪數</label><input type="number" id="pg_${s}" value="${s==='A'?16.9:19.41}" oninput="calc()"></div></div>
                        <div class="input-row"><div class="input-group"><label>利率%</label><input type="number" id="ir_${s}" value="2.6" oninput="calc()"></div><div class="input-group"><label>寬限年</label><input type="number" id="gr_${s}" value="3" oninput="calc()"></div></div>
                        <div class="input-group"><label>月租金</label><input type="number" id="mr_${s}" value="35000" oninput="calc()"></div>
                        <div class="input-group"><label>持有年期</label><input type="number" id="hy_${s}" value="5" step="0.1" oninput="calc()"></div>
                        <div class="input-group"><label>貸款%</label><input type="text" id="lp_${s}" value="60, 70, 80" oninput="calc()"></div>
                        <div class="input-group"><label>預期單價</label><input type="text" id="cp_${s}" value="${s==='A'? '150,155,160,165':'100,105,110,115'}" oninput="calc()"></div>
                    </div>
                    <div class="matrix-container">
                        <table class="matrix-table">
                            <thead><tr>
                                <th>單價<br>(萬)</th><th>總價<br>(萬)</th><th>仲介<br>(4%)</th><th>合一<br>(稅%)</th><th>利息<br>(萬)</th><th>付出<br>(萬)</th><th>淨利<br>(萬)</th><th>CAGR<br>(%)</th>
                            </tr></thead>
                            <tbody id="body_${s}"></tbody>
                        </table>
                    </div>
                </div>`;
            document.getElementById('mainGrid').innerHTML += html;
        });
        calc();
    }
    function calc() {
        ['A', 'B'].forEach(s => {
            const y = parseFloat(document.getElementById('hy_'+s).value) || 0, taxR = getTaxRate(y);
            const tp = parseFloat(document.getElementById('tp_'+s).value)*10000, pg = parseFloat(document.getElementById('pg_'+s).value);
            const ir = parseFloat(document.getElementById('ir_'+s).value)/100, gr = parseFloat(document.getElementById('gr_'+s).value);
            const body = document.getElementById('body_'+s); body.innerHTML = '';
            document.getElementById('lp_'+s).value.split(',').forEach(lpS => {
                const lp = parseFloat(lpS), la = tp*(lp/100), misc = tp*0.02, down = tp-la;
                const pay = calcPayment(la, ir, gr);
                let instT = 0, rem = la;
                for(let m=1; m<=Math.ceil(y*12); m++) { let i = rem*(ir/12); instT += i; if(m>gr*12) rem -= ((la/(360-gr*12))-i); }
                body.innerHTML += `<tr><td colspan="8" class="loan-group-header ${s==='B'?'b':''}">貸款${lp}% ➔【投入:${((down+misc)/10000).toFixed(1)}萬(自備${down/10000}+雜${misc/10000})】 ｜ 月支➔寬限:${(pay.grace/10000).toFixed(2)}萬 / 後:${(pay.post/10000).toFixed(2)}萬</td></tr>`;
                document.getElementById('cp_'+s).value.split(',').forEach(spS => {
                    const sp = parseFloat(spS), est = sp*pg*10000, fee = est*0.04, gain = (est-tp)+(parseFloat(document.getElementById('mr_'+s).value)*12*y)-misc-fee;
                    const tax = gain>0 ? gain*taxR : 0, net = gain-instT-tax, cagr = (Math.pow(((down+misc)+net)/(down+misc), 1/y)-1)*100;
                    body.innerHTML += `<tr><td>${sp}</td><td>${Math.round(est/10000)}</td><td>${(fee/10000).toFixed(1)}</td><td>${(taxR*100).toFixed(0)}%</td><td style="color:#b7791f; font-weight:600;">${(instT/10000).toFixed(1)}</td><td style="color:#9b2c2c; font-weight:600;">${(((down+misc)+instT)/10000).toFixed(1)}</td><td style="background:#ebf8ff; font-weight:700; color:${net>=0?'#e53e3e':'#38a169'}">${(net/10000).toFixed(1)}</td><td>${cagr.toFixed(1)}%</td></tr>`;
                });
            });
        });
    }
    function exportExcel() {
        const wb = XLSX.utils.book_new();
        let data = [["投資分析報告"], []];
        ['A', 'B'].forEach(s => {
            data.push([`物件 ${s} 參數`, `總價:${document.getElementById('tp_'+s).value}萬`, `坪數:${document.getElementById('pg_'+s).value}`, `利率:${document.getElementById('ir_'+s).value}%`]);
            data.push(["貸款成數", "單價(萬)", "總價(萬)", "仲介(4%)", "合一(稅%)", "利息(萬)", "付出(萬)", "淨利(萬)", "CAGR(%)"]);
            const rows = document.getElementById('body_'+s).rows;
            let cur = "";
            for(let r of rows) {
                if(r.cells.length === 1) cur = r.cells[0].innerText.split('➔')[0];
                else data.push([cur, ...Array.from(r.cells).map(c => c.innerText)]);
            }
            data.push([]);
        });
        XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet(data), "分析結果");
        XLSX.writeFile(wb, "房屋投資分析.xlsx");
    }
    render();
</script>
</body>
</html>
